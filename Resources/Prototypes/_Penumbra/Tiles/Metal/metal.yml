- type: tile
  id: PenumbraBaseShipTile
  abstract: true
  isSubfloor: false
  deconstructTools: [ Prying ]
  footstepSounds:
    collection: FootstepFloor
  heatCapacity: 10000
  baseTurf: PenumbraPlating
  baseWhitelist:
  - PlatingBrass
  - FloorAsteroidIronsand
  - FloorAsteroidSand
  - FloorAsteroidSandBorderless
  - FloorAsteroidIronsandBorderless
  - FloorAsteroidSandRedBorderless
  - PlatingAsteroid
  - PlatingSnow
  - FloorPlanetDirt
  - FloorDesert
  - FloorLowDesert
  - FloorPlanetGrass
  - FloorSnow
  - FloorDirt
  - PlatingRCD
  - FloorHullReinforced

