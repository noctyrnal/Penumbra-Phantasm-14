- type: constructionGraph
  id: PenumbraGirder
  start: start
  graph:
    - node: start
      edges:
        - to: penumbraGirder
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: Steel
              amount: 2
              doAfter: 1

    - node: penumbraGirder
      entity: PenumbraGirder
      edges:
