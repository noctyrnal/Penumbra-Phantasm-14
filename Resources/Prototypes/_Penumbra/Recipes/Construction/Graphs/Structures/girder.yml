            - material: Plasteel
              amount: 2
              doAfter: 1

        - to: penumbraGirder
          completed:
            - !type:SnapToGrid
              southRotation: true
            - !type:SpawnPrototype
              prototype: SheetPlasteel1
              amount: 2
          conditions:
            - !type:EntityAnchored { }
          steps:
            - tool: Cutting
              doAfter: 2

    - node: penumbraWallrust
      entity: PenumbraWallMetalRusted
      edges:
        - to: penumbraWall
          steps:
            - tool: Welding
              doAfter: 2
        - to: wall
          steps:
            - tool: Brushing
              doAfter: 4

    - node: penumbraReinforcedWall
      entity: PenumbraReinforcedWall
      edges:
        - to: penumbraReinforcedGirder
          completed:
            - !type:SpawnPrototype
              prototype: SheetPlasteel1
              amount: 2
