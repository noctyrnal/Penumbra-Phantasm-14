- type: entity
  parent: Grille
  id: PenumbraGrille
  suffix: Penumbra
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Walls/grille.rsi
    layers:
    - state: full
    - state: electrified
      sprite: Effects/electricity.rsi
      map: ["enum.ElectrifiedLayers.Sparks"]
      shader: unshaded
      visible: false
  - type: Icon
    sprite: _Penumbra/Structures/Walls/grille.rsi
    state: full
  - type: IconSmooth
    key: walls
    additionalKeys:
    - windows
    - doors
    base: grille
