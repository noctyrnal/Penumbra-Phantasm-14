- type: entity
  parent: BaseRailing
  id: PenumbraBaseRailing
  abstract: true
  suffix: Penumbra
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Walls/railing.rsi
  - type: Icon
    sprite: _Penumbra/Structures/Walls/railing.rsi

- type: entity
  parent: PenumbraBaseRailing
  id: PenumbraRailing
  components:
  - type: Sprite
    state: side
  - type: Icon
    state: side
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.25"
        density: 1000
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          PartRodMetal1:
            min: 0
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    node: railing

