- type: entity
  parent: SeatBase
  id: PenumbraSeatBase
  description: You sit in this. It stops you from getting hurled around during an Anti-Space Jump.
  suffix: Penumbra
  abstract: true
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Furniture/chairs.rsi

#Starts unanchored, cannot be rotated while anchored
- type: entity
  parent: PenumbraSeatBase
  id: PenumbraUnanchoredChairBase
  name: chair
  abstract: true
  components:
  - type: Anchorable
  - type: Rotatable

#Start anchored, cannot be rotated while anchored
- type: entity
  parent: PenumbraUnanchoredChairBase
  id: PenumbraChairBase
  name: chair
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true

#Starts unanchored, can be rotated while anchored
- type: entity
  parent: PenumbraUnanchoredChairBase
  id: PenumbraOfficeChairBase
  name: chair
  abstract: true
  components:
  - type: Rotatable
    rotateWhileAnchored: true

#Starts anchored, can be rotated while anchored
- type: entity
  parent: PenumbraOfficeChairBase
