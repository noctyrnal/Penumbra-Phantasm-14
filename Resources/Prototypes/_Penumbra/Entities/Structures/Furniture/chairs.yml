- type: entity
  parent: PenumbraUnanchoredChairBase
  id: PenumbraChairWood
  name: wooden chair
  components:
  - type: Sprite
    state: wooden_chair
  # - type: Construction TODO PENUMBRA - Construction
  #   graph: Seat
  #   node: chairWood
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 1
  - type: Tag
    tags:
    - Wooden
  - type: StaticPrice
    price: 75

