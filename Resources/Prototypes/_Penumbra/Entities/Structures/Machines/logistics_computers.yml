- type: entity
  parent: [ PenumbraBaseComputerAiAccess, ComputerCargoOrders ]
  id: PenumbraComputerCargoOrders
  name: logistics request computer
  description: Used to order supplies and approve logistics requests.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerScreen"]
      state: request
    - map: ["computerLayerKeys"]
      state: generic_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: panel_open

