- type: entity
  parent: VendingMachine
  id: PenumbraVendingMachineFood
  name: Arakawa Packaged Meals
  description: A vendor from Arakawa Corp, which provides small packaged ready-to-eat meals of dubious quality, prepared on the fly through hot water pumped into the package upon vending.
  components:
  - type: VendingMachine
    pack: ChangInventory
    dispenseOnHitChance: 0.25
    dispenseOnHitThreshold: 2
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    initialStockQuality: 0.33
  - type: DatasetVocalizer
    dataset: ChangAds
  - type: SpeakOnUIClosed
    pack: ChangGoodbyes
  - type: Transform
    noRot: false
  - type: Sprite
    sprite: _Penumbra/Structures/Machines/VendingMachines/food.rsi
    snapCardinals: false
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 3.0
    color: "#ffe599"
