- type: entity
  parent: VendingMachineCigs
  id: PenumbraVendingMachineCigs
  name: Glasgow Cigs
  description: A staple of any merchant or civilian class vessel, this is a vending machine which vends cigarettes. You havent heard of Glasgow before though, ain't that one of those Old-Earth locations?
  components:
  - type: Transform
    noRot: false
  - type: Sprite
    sprite: _Penumbra/Structures/Machines/VendingMachines/cigs.rsi
    snapCardinals: false
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]

