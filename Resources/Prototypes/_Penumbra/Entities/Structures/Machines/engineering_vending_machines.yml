- type: entity
  parent: VendingMachineYouTool
  id: PenumbraVendingMachineTools
  name: Surplus Tools Vendor
  description: A vendor for surplus tools, perfect for any wanna-be engineers, or people with less than admirable kleptomania.
  components:
  - type: Transform
    noRot: false
  - type: Sprite
    sprite: _Penumbra/Structures/Machines/VendingMachines/tools.rsi
    snapCardinals: false
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]

- type: entity
