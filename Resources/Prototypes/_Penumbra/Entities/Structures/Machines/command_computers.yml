- type: entity
  parent: [ PenumbraBaseComputerAiAccess, ComputerComms ]
  id: PenumbraComputerComms
  name: communications computer
  description: A computer used to make station wide announcements via keyboard, set the appropriate alert level, and authorize evacuation.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerScreen"]
      state: comm
    - map: ["computerLayerKeys"]
      state: security_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: panel_open

