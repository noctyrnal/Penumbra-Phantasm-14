# Frame

- type: entity
  parent: ComputerFrame
  id: PenumbraComputerFrame
  name: computer frame
  description: A computer under construction.
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Machines/computers.rsi
    layers:
    - state: computer
      map: [ "enum.ConstructionVisuals.Layer" ]
  - type: GenericVisualizer # TODO PENUMBRA
    visuals:
      enum.ConstructionVisuals.Key:
        enum.ConstructionVisuals.Layer:
          frameUnsecured: { state: computer }
          boardUnsecured: { state: computer }
          missingWires: { state: computer }
          monitorMissing: { state: computer }
          monitorUnsecured: { state: computer }

