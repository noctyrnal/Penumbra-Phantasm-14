- type: entity
  parent: BaseComputer
  id: PenumbraBaseComputer
  suffix: Penumbra
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_key
    - map: ["computerLayerScreen"]
      state: generic
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: panel_open

