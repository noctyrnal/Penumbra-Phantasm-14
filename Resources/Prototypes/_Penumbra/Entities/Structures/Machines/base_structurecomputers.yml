- type: entity
  parent: BaseComputer
  id: PenumbraBaseComputer
  suffix: Penumbra
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_key
    - map: ["computerLayerScreen"]
      state: generic
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: panel_open

- type: entity
  parent: PenumbraBaseComputer
  id: PenumbraBaseComputerAiAccess
  suffix: Penumbra, AI Access
  components:
  - type: StationAiWhitelist
  - type: Wires
    boardName: wires-board-name-computer
    layoutId: ComputerAi
