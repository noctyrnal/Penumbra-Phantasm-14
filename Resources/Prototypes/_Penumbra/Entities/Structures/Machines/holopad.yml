- type: entity
  parent: PenumbraHolopad
  id: PenumbraHolopadLongRange
  name: long-range holopad
  description: A floor-mounted device for projecting holographic images to similar devices that are far away.
  components:
  - type: Telephone
    transmissionRange: Map
    compatibleRanges:
    - Map
    - Unlimited
    ignoreTelephonesOnSameGrid: true

- type: entity
  parent: PenumbraHolopad
  id: PenumbraHolopadUnlimitedRange
  name: hyper-range holopad
  description: An floor-mounted device for projecting holographic images to similar devices at extreme distances.
  components:
  - type: Telephone
    transmissionRange: Unlimited
    compatibleRanges:
    - Map
    - Unlimited
    ignoreTelephonesOnSameGrid: true

- type: entity
  parent: PenumbraHolopad
  id: PenumbraHolopadAntiSpace
  name: anti-space holopad
  description: An experimental floor-mounted device for projecting holographic images through Anti-Space.
  s.uffix: Penumbra, Admin
  components:
  - type: Telephone
    unlistedNumber: true
    transmissionRange: Unlimited
    compatibleRanges:
    - Grid
    - Map
    - Unlimited

