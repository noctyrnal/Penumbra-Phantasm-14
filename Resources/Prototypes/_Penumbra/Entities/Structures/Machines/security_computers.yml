- type: entity
  parent: [ PenumbraBaseComputerAiAccess, ComputerSurveillanceCameraMonitor ]
  id: PenumbraComputerSurveillanceCameraMonitor
  name: camera monitor
  description: A surveillance camera monitor. You're watching them. Maybe.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerScreen"]
      state: cameras
    - map: ["computerLayerKeys"]
      state: security_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: panel_open

