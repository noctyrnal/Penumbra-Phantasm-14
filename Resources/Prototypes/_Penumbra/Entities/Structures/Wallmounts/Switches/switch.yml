# lockable buttons

- type: entity
  parent: PenumbraSignalButtonDirectional
  id: PenumbraLockableButton
  name: lockable button
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: Lock
  - type: LockVisuals
  - type: AccessReader
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _Penumbra/Structures/Wallmounts/locked_switch.rsi
    layers:
    - state: base
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded

- type: entity
  parent: PenumbraLockableButton
  id: PenumbraLockableButtonCaptain
  suffix: Penumbra, Captain
  components:
  - type: AccessReader
    access: [["Captain"]]

