- type: entity
  parent: BaseIntercom
  id: PenumbraBaseIntercom
  suffix: Penumbra
  abstract: true
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Wallmounts/intercom.rsi
  # - type: Construction TODO PENUMBRA - Construction
  #   graph: Intercom
  #   node: intercom
  #   containers:
  #   - board
  #   - key_slots

# this weird inheritance BS exists for construction shitcode
- type: entity
  parent: PenumbraBaseIntercom
  id: PenumbraIntercomConstructed
  suffix: Penumbra, Empty, Panel Open
  components:
  - type: Sprite
    layers:
    - state: base
    - state: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      shader: unshaded
    - state: broadcasting
      map: ["enum.RadioDeviceVisualLayers.Broadcasting"]
      shader: unshaded
      visible: false
    - state: speaker
      map: ["enum.RadioDeviceVisualLayers.Speaker"]
      shader: unshaded
      visible: false
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
      visible: true
  - type: WiresPanel
    open: true

- type: entity
  parent: PenumbraIntercomConstructed
  id: PenumbraIntercom
  suffix: Penumbra
  components:
  - type: Sprite
    layers:
    - state: base
    - state: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      shader: unshaded
    - state: broadcasting
      map: ["enum.RadioDeviceVisualLayers.Broadcasting"]
      shader: unshaded
      visible: false
    - state: speaker
      map: ["enum.RadioDeviceVisualLayers.Speaker"]
      shader: unshaded
      visible: false
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: WiresPanel
    open: false

- type: entity
  parent: PenumbraIntercom
  id: PenumbraBaseIntercomSecure
  abstract: true
  components:
  - type: WiresPanel
    openDelay: 5
  - type: WiresPanelSecurity
    examine: wires-panel-component-on-examine-security-level2
    wiresAccessible: false
  - type: Construction
    node: intercomReinforced

- type: entity
  parent: PenumbraIntercom
  id: PenumbraIntercomCommon
  suffix: Penumbra, Common
  components:
  - type: ContainerFill
    containers:
      board:
      - IntercomElectronics
      key_slots:
      - EncryptionKeyCommon

- type: entity
  parent: PenumbraBaseIntercomSecure
  id: PenumbraIntercomCommand
  suffix: Penumbra, Command
  description: An intercom. It's been reinforced with metal.
  components:
