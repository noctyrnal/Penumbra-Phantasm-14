- type: entity
  parent: Screen
  id: PenumbraScreen
  suffix: Penumbra
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Wallmounts/screen.rsi
    layers:
    - state: screen
    - state: green
      map: ["enum.AlertLevelDisplay.Layer"]
      shader: unshaded
  - type: TextScreenVisuals
    textOffset: 0,-8
    timerOffset: 0,-4
    rows: 1
  - type: AlertLevelDisplay
    alertVisuals:
      green: green
      blue: blue
      red: red
      violet: violet
      yellow: yellow
      delta: delta

- type: entity
  parent: PenumbraScreen
  id: PenumbraArrivalsShuttleTimer
  name: arrivals screen
  description: Displays time of arrivals shuttle ETA.
  components:
  - type: DeviceNetwork
    deviceNetId: Private
    receiveFrequencyId: ArrivalsShuttleTimer
