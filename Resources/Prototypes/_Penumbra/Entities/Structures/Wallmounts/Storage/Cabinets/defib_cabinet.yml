- type: entity
  parent: BaseWallmountMetallic
  id: PenumbraDefibrillatorMount
  name: defibrillator mount
  description: Holds defibrillators. You can take it off if one is mounted.
  suffix: Pebnumbra
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Wallmounts/defib_mount.rsi
    noRot: false
    layers:
    - state: frame
    - state: fill
      map: ["enum.ItemCabinetVisuals.Layer"]
      visible: true
  - type: ItemCabinet
  - type: ItemSlots
    slots:
      ItemCabinet:
        ejectOnInteract: true
        whitelist:
          components:
          - Defibrillator
  - type: ContainerContainer
    containers:
      ItemCabinet: !type:ContainerSlot
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ItemCabinetVisuals.ContainsItem:
        enum.ItemCabinetVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  # - type: Construction TODO PENUMBRA - Construction
  #   graph: DefibrillatorCabinet
  #   node: done

- type: entity
  parent: PenumbraDefibrillatorMount
  id: PenumbraDefibrillatorMountFilled
  suffix: Penumbra, Filled
  components:
  - type: ContainerFill
    containers:
      ItemCabinet:
      - PenumbraDefibrillator
