# Base

- type: entity
  parent: PenumbraAirlockRCDResistant
  id: PenumbraAirlockExternal
  suffix: Penumbra, Solid, External, No Access
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Doors/Airlocks/Standard/external.rsi

- type: entity
  parent: PenumbraAirlockExternal
  id: PenumbraAirlockExternalGlass
  suffix: Penumbra, Glass, External, No Access
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Doors/Airlocks/Glass/external.rsi
  - type: Door
    occludes: false
  - type: Occluder
    enabled: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49" # don't want this colliding with walls or they won't close
        density: 100
        mask:
        - FullTileMask
        layer:     #removed opaque from the layer, allowing lasers to pass through glass airlocks
        - GlassAirlockLayer

# Solid Access

- type: entity
  parent: PenumbraAirlockExternal
  id: PenumbraAirlockExternalLocked
  suffix: Penumbra, Solid, External, Locked
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsExternal ]

- type: entity
  parent: PenumbraAirlockExternalLocked
  id: PenumbraAirlockExternalCargoLocked
  suffix: Penumbra, Solid, External, Logistics Access
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsCargo ]
  - type: Wires
    layoutId: AirlockCargo

- type: entity
