# Default

- type: entity
  parent: SuitStorageBase
  id: PenumbraSuitStorage
  description: A commercial unit made to hold EVA rigs while not in use.
  suffix: Penumbra, Empty
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Storage/suit_storage.rsi
  - type: EntityStorage
    closeSound:
      path: /Audio/Machines/airlock_open.ogg
    openSound:
      path: /Audio/Machines/airlock_close.ogg

- type: entity
  parent: PenumbraSuitStorage
  id: PenumbraSuitStorageEVA
  suffix: Penumbra, EVA
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillSuitStorageEVA

- type: entity
  parent: PenumbraSuitStorage
  id: PenumbraSuitStorageEVAPrisoner
  suffix: Penumbra, Prisoner EVA
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillSuitStorageEVAPrisoner

- type: entity
  parent: PenumbraSuitStorage
  id: PenumbraSuitStorageSec
  suffix: Penumbra, Security
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillSuitStorageSecurity
  - type: AccessReader
    access: [["Security"]]

- type: entity
  parent: PenumbraSuitStorage
  id: PenumbraSuitStorageCMO
  suffix: Penumbra, Chief Medical Officer
