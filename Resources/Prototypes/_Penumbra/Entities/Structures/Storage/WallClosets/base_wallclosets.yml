- type: entity
  parent: BaseWallCloset
  id: PenumbraBaseWallCloset
  abstract: true
  description: A standard-issue storage unit, now on walls.
  suffix: Penumbra
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Storage/WallClosets/closet.rsi
    noRot: false
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: door
      map: ["enum.StorageVisualLayers.Door"]
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
  - type: EntityStorageVisuals
    stateBaseClosed: base
    stateDoorOpen: door_open
    stateDoorClosed: door

