# TODO PENUMBRA - Construction
# I couldn't comment out the construction like usual because robust toolbox started crying about missing construction nodes

- type: entity
  parent: BaseFilingCabinet
  id: PenumbraBaseFilingCabinet
  suffix: Penumbra, Empty
  abstract: true
  components:
  - type: Sprite
    sprite: _Penumbra/Structures/Storage/cabinets.rsi
    noRot: false
  - type: Transform
    noRot: false

- type: entity
  parent: PenumbraBaseFilingCabinet
  id: PenumbraFilingCabinet
  name: filing cabinet
  components:
  - type: Sprite
    state: filingcabinet
    layers:
    - state: filingcabinet
    - state: filingcabinet-open
      map: ["openLayer"]
  - type: Construction
    node: filingCabinet

- type: entity
  parent: PenumbraFilingCabinet
  id: PenumbraFilingCabinetTall
  components:
  - type: Sprite
    state: tallcabinet
    layers:
    - state: tallcabinet
    - state: tallcabinet-open
      map: ["openLayer"]
  - type: Construction
    node: filingCabinet

- type: entity
  parent: PenumbraFilingCabinet
  id: PenumbraFilingCabinetWide
  components:
  - type: Sprite
    state: widecabinet
    layers:
    - state: widecabinet
    - state: widecabinet-open
      map: ["openLayer"]
  - type: Construction
    node: filingCabinet

- type: entity
  parent: PenumbraFilingCabinet
  id: PenumbraFilingCabinetDouble
  components:
  - type: Sprite
    state: doublefilingcabinet
    layers:
    - state: doublefilingcabinet
    - state: doublefilingcabinet-open
      map: ["openLayer"]
  - type: Construction
    node: filingCabinet

- type: entity
  parent: PenumbraFilingCabinet
  id: PenumbraFilingCabinetTallDouble
  components:
  - type: Sprite
    state: doubletallcabinet
    layers:
    - state: doubletallcabinet
    - state: doubletallcabinet-open
      map: ["openLayer"]
  - type: Construction
    node: filingCabinet

- type: entity
  parent: PenumbraFilingCabinet
  id: PenumbraFilingCabinetWideDouble
  components:
  - type: Sprite
    state: doublewidecabinet
    layers:
    - state: doublewidecabinet
    - state: doublewidecabinet-open
      map: ["openLayer"]
  - type: Construction
    node: filingCabinet

- type: entity
  parent: PenumbraBaseFilingCabinet
  id: PenumbraFilingCabinetDrawer
  name: chest drawer
  description: A small drawer for all your filing needs, Now with wheels!
  suffix: Penumbra, Empty
  components:
  - type: Sprite
    state: chestdrawer
    layers:
    - state: chestdrawer
    - state: chestdrawer-open
      map: ["openLayer"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.22,-0.42,0.22,0.34"
        density: 210
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Construction
    node: chestDrawer
  - type: RequireProjectileTarget

- type: entityTable
  id: PenumbraFilingCabinetFillTable
  table: !type:AllSelector
    children:
    - !type:GroupSelector
      rolls: !type:RangeNumberSelector
        range: 2, 4
      children:
      - id: BoxFolderBase
      - id: BoxFolderRed
      - id: BoxFolderBlue
      - id: BoxFolderYellow
      - id: BoxFolderGrey
      - id: BoxFolderBlack
      - id: BoxFolderGreen
    - !type:GroupSelector
      rolls: !type:RangeNumberSelector
        range: 0, 3
      children:
      - id: PenumbraPaper
      - id: PaperOffice
    - !type:GroupSelector
      prob: .3
      rolls: !type:ConstantNumberSelector
        value: 2
      children:
      - id: Pen
    - !type:GroupSelector
      prob: 0.15
      children:
      - !type:AllSelector
        weight: 0.2
        children:
        - id: RubberStampApproved
        - id: RubberStampDenied
      - id: RubberStampGreytide
        weight: 0.1
      - id: LuxuryPen
      - id: NanoTaskCartridge

- type: entity
  abstract: true
  id: PenumbraBaseBureaucraticStorageFill
  suffix: Penumbra, Filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:NestedSelector
        tableId: PenumbraFilingCabinetFillTable

- type: entity
  parent: [PenumbraBaseBureaucraticStorageFill, PenumbraFilingCabinet]
  id: PenumbraFilingCabinetRandom

- type: entity
  parent: [PenumbraBaseBureaucraticStorageFill, PenumbraFilingCabinetDrawer]
  id: PenumbraFilingCabinetDrawerRandom

- type: entity
  parent: [PenumbraBaseBureaucraticStorageFill, PenumbraFilingCabinetTall]
  id: PenumbraFilingCabinetTallRandom

- type: entity
  parent: [PenumbraBaseBureaucraticStorageFill, PenumbraFilingCabinetWide]
  id: PenumbraFilingCabinetWideRandom

- type: entity
  parent: [PenumbraBaseBureaucraticStorageFill, PenumbraFilingCabinetDouble]
  id: PenumbraFilingCabinetDoubleRandom

- type: entity
  parent: [PenumbraBaseBureaucraticStorageFill, PenumbraFilingCabinetTallDouble]
  id: PenumbraFilingCabinetTallDoubleRandom

- type: entity
  parent: [PenumbraBaseBureaucraticStorageFill, PenumbraFilingCabinetWideDouble]
  id: PenumbraFilingCabinetWideDoubleRandom
