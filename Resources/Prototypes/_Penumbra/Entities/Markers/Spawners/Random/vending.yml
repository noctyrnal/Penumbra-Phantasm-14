- type: entity
  parent: RandomVending
  id: PenumbraRandomVending
  name: random vending machine spawner
  suffix: Penumbra, Any
  components:
  - type: Transform
    noRot: false
  - type: Sprite
    snapCardinals: false
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: PenumbraVendingMachineCoffee
      - id: PenumbraVendingMachineCigs

