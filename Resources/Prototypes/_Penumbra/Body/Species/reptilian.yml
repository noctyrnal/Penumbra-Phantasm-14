  id: PenumbraAppearanceReptilian
  categories: [ HideSpawnMenu ]
  name: penumbra reptilian appearance
  components:
  - type: Inventory
    speciesId: reptilian
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: PenumbraOrganReptilianTorso
      Head: PenumbraOrganReptilianHead
      ArmLeft: PenumbraOrganReptilianArmLeft
      ArmRight: PenumbraOrganReptilianArmRight
      HandRight: PenumbraOrganReptilianHandRight
      HandLeft: PenumbraOrganReptilianHandLeft
      LegLeft: PenumbraOrganReptilianLegLeft
      LegRight: PenumbraOrganReptilianLegRight
      FootLeft: PenumbraOrganReptilianFootLeft
      FootRight: PenumbraOrganReptilianFootRight
      Brain: PenumbraOrganReptilianBrain
      Eyes: PenumbraOrganReptilianEyes
      Tongue: PenumbraOrganReptilianTongue
      Appendix: PenumbraOrganReptilianAppendix
      Ears: PenumbraOrganReptilianEars
      Lungs: PenumbraOrganReptilianLungs
      Heart: PenumbraOrganReptilianHeart
      Stomach: PenumbraOrganReptilianStomach
      Liver: PenumbraOrganReptilianLiver
      Kidneys: PenumbraOrganReptilianKidneys
  - type: HumanoidProfile
    species: PenumbraReptilian

- type: entity
  parent:
  - PenumbraAppearanceReptilian
  - BaseSpeciesMobOrganic
  id: PenumbraMobReptilian
  name: Urist Penumbra McScales
  suffix: Penumbra
  components:
  - type: Puller
    needsHands: false
  - type: Butcherable
    spawned:
    - id: FoodMeatLizard
      amount: 5
  - type: LizardAccent
  - type: Speech
    speechSounds: Lizard
    speechVerb: Reptilian
    allowedEmotes: ['Thump']
  - type: TypingIndicator
    proto: lizard
  - type: CreamPied
    sprite:
      sprite: Effects/creampie.rsi
      state: creampie_lizard
  - type: Vocal
    emoteSounds: MaleReptilian
  - type: BodyEmotes
    soundsId: ReptilianBodyEmotes
  - type: Damageable
    damageModifierSet: Scale
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: TemperatureDamage
    heatDamageThreshold: 400
    coldDamageThreshold: 285
    coldDamage:
      types:
        Cold : 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      301: 0.9
      295: 0.8
      285: 0.7
  - type: Wagging

